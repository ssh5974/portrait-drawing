<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><title>자화상 그리기</title>
<style>
body{margin:0;font-family:sans-serif}#bar{padding:8px;background:#eee;display:flex;gap:8px;align-items:center}
#wrap{display:flex;height:calc(100vh - 50px)}#photo{flex:1;display:flex;justify-content:center;align-items:center;background:#f8f8f8}
#photo img{max-width:100%;max-height:100%}#draw{flex:1;position:relative;background:#fff}
canvas{border-left:1px solid #ccc;touch-action:none}
</style></head><body>
<div id="bar">
<input type="file" id="file" accept="image/*">
<input type="color" id="color" value="#000000">
<input type="range" id="size" min="1" max="20" value="3">
<button id="erase">지우개</button>
<button id="clear">전체지우기</button>
<button id="save">저장</button>
</div>
<div id="wrap"><div id="photo"><img id="img"></div><div id="draw"><canvas id="c"></canvas></div></div>
<script>
const img=document.getElementById('img');
file.onchange=e=>{const f=e.target.files[0];if(f)img.src=URL.createObjectURL(f);}
const cv=c,ctx=cv.getContext('2d');
function rs(){cv.width=draw.clientWidth;cv.height=draw.clientHeight;}
onresize=rs;rs();
let d=false,erase=false;
function pos(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top};}
function st(e){d=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
function mv(e){if(!d)return;e.preventDefault();const p=pos(e);ctx.lineWidth=size.value;ctx.lineCap='round';ctx.strokeStyle=erase?'#fff':color.value;ctx.lineTo(p.x,p.y);ctx.stroke();}
function en(){d=false;}
cv.onmousedown=st;cv.onmousemove=mv;onmouseup=en;
cv.ontouchstart=st;cv.ontouchmove=mv;cv.ontouchend=en;
erase.onclick=()=>{erase=!erase;erase.onclick.textContent=erase?"펜":"지우개";}
clear.onclick=()=>ctx.clearRect(0,0,cv.width,cv.height);
save.onclick=()=>{const a=document.createElement('a');a.download='drawing.png';a.href=cv.toDataURL();a.click();}
</script></body></html>
